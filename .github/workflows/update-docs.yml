name: Update Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache analysis results
        uses: actions/cache@v4
        with:
          path: .autodoc-cache
          key: autodoc-cache-${{ github.sha }}
          restore-keys: |
            autodoc-cache-

      - name: Install open-auto-doc
        run: npm install -g @latent-space-labs/open-auto-doc

      - name: Generate documentation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: open-auto-doc generate --incremental

      - name: Clone docs repo
        run: |
          git clone https://x-access-token:${{ secrets.DOCS_DEPLOY_TOKEN }}@github.com/Latent-Space-Labs/open-auto-doc-docs2.git docs-repo

      - name: Copy updated content
        run: |
          # Copy content and any updated config, preserving the docs repo git history
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.source' \
            docs-site/ docs-repo/

      - name: Push to docs repo
        run: |
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No documentation changes to push."
          else
            git commit -m "Update documentation from ${{ github.repository }}@${{ github.sha }}"
            git push
          fi
